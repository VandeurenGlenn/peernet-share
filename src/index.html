<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Peernet Share</title>
    <style>
      .main-container {
        max-width: 700px;
        margin: 48px auto 0 auto;
        padding: 0 1.5em 2em 1.5em;
        display: flex;
        flex-direction: column;
        gap: 2em;
        z-index: 2;
        position: relative;
      }
      .center-viewport {
        min-height: 100vh;
        width: 100vw;
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 2;
        position: relative;
      }
      .main-container {
        max-width: 700px;
        width: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 2em;
        margin: 0 auto;
        padding: 0 1.5em;
      }
      .glass-card {
        background: rgba(255, 255, 255, 0.1);
        border-radius: 18px;
        box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.18);
        border: 1.5px solid rgba(255, 255, 255, 0.18);
        backdrop-filter: blur(12px) saturate(160%);
        -webkit-backdrop-filter: blur(12px) saturate(160%);
        padding: 2em 2em 1.5em 2em;
        margin-bottom: 0.5em;
      }
      .header {
        font-size: 2.2em;
        font-weight: 700;
        letter-spacing: -1px;
        color: #fff;
        text-shadow: 0 2px 16px #2563eb44;
        margin-bottom: 0.5em;
        padding-top: 0.5em;
      }
      .controls-row {
        display: flex;
        flex-wrap: wrap;
        gap: 1em;
        align-items: center;
        margin-bottom: 1.2em;
      }
      .controls-row input[type='file'],
      .controls-row select {
        font-size: 1em;
        padding: 0.5em 1em;
        border-radius: 8px;
        border: 1px solid #cbd5e1;
        background: rgba(255, 255, 255, 0.18);
        color: #222;
        outline: none;
        transition:
          border 0.2s,
          box-shadow 0.2s;
      }
      .controls-row select {
        min-width: 120px;
      }
      .controls-row button {
        background: linear-gradient(90deg, #4299e1 0%, #3182ce 100%);
        color: #fff;
        border: none;
        border-radius: 8px;
        padding: 0.6em 1.3em;
        font-size: 1em;
        font-weight: 600;
        cursor: pointer;
        box-shadow: 0 2px 8px rgba(66, 153, 225, 0.08);
        transition:
          background 0.2s,
          box-shadow 0.2s;
      }
      .controls-row button:hover {
        background: linear-gradient(90deg, #3182ce 0%, #4299e1 100%);
        box-shadow: 0 4px 16px #4299e144;
      }
      .status-card {
        background: rgba(255, 255, 255, 0.13);
        border-radius: 14px;
        box-shadow: 0 2px 12px 0 rgba(31, 38, 135, 0.1);
        border: 1.2px solid rgba(255, 255, 255, 0.13);
        padding: 1.2em 1.5em 1.2em 1.5em;
        color: #222;
        font-size: 1.04em;
        margin-bottom: 0.5em;
        min-height: 90px;
        overflow-y: auto;
        max-height: 180px;
      }
      .status-card div {
        margin-bottom: 0.3em;
        color: #222;
        word-break: break-all;
      }
      .peer-id {
        color: #bae6fd;
        font-size: 1.01em;
        margin-bottom: 0.7em;
        word-break: break-all;
      }
      /* Glassmorphism and background improvements */
      background-animation {
        all: unset;
        display: block;
      }
      #loadingContent {
        background: rgba(17, 24, 39, 0.65);
        box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
        border-radius: 22px;
        padding: 2.5em 2.5em 2em 2.5em;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-width: 320px;
        max-width: 90vw;
        border: 1.5px solid rgba(255, 255, 255, 0.18);
        backdrop-filter: blur(16px) saturate(180%);
        -webkit-backdrop-filter: blur(16px) saturate(180%);
        z-index: 10;
      }
      #loadingContent h2 {
        font-size: 2.1em;
        font-weight: 700;
        margin-bottom: 0.5em;
        letter-spacing: 1px;
        color: #fff;
        text-shadow: 0 2px 16px #2563eb44;
      }
      #loadingContent p {
        color: #bae6fd;
        font-size: 1.13em;
        margin-bottom: 1.5em;
        text-align: center;
        text-shadow: 0 1px 8px #0ea5e944;
      }
      .modern-loader {
        width: 48px;
        height: 48px;
        border: 4px solid #2563eb44;
        border-top: 4px solid #38bdf8;
        border-radius: 50%;
        animation: spin 1s linear infinite;
        margin: 0 auto;
        box-shadow: 0 0 16px #38bdf888;
      }
      @keyframes spin {
        0% {
          transform: rotate(0deg);
        }
        100% {
          transform: rotate(360deg);
        }
      }
      body {
        font-family: 'Inter', 'Segoe UI', Arial, sans-serif;
        margin: 0;
        background: #0f172a;
        color: #fff;
        inset: 0;
        position: fixed;
        min-height: 100vh;
        min-width: 100vw;
        overflow-x: hidden;
      }
      .container {
        max-width: 600px;
        margin: 40px auto;
        background: #fff;
        border-radius: 16px;
        box-shadow: 0 4px 24px rgba(0, 0, 0, 0.08);
        padding: 2.5em 2em 2em 2em;
      }
      h1 {
        font-size: 2.2em;
        font-weight: 700;
        margin-bottom: 0.5em;
        letter-spacing: -1px;
        color: #2b6cb0;
      }
      .row {
        display: flex;
        gap: 1em;
        margin-bottom: 1em;
        align-items: center;
      }
      #fileInput,
      #folderSelect,
      button {
        font-size: 1em;
        padding: 0.5em 1em;
        border-radius: 6px;
        border: 1px solid #cbd5e1;
        background: #f1f5f9;
        transition:
          border 0.2s,
          box-shadow 0.2s;
      }
      button {
        background: linear-gradient(90deg, #4299e1 0%, #3182ce 100%);
        color: #fff;
        border: none;
        cursor: pointer;
        font-weight: 600;
        box-shadow: 0 2px 8px rgba(66, 153, 225, 0.08);
      }
      button:hover {
        background: linear-gradient(90deg, #3182ce 0%, #4299e1 100%);
      }
      #log {
        margin-top: 2em;
        background: #f1f5f9;
        padding: 1em;
        border-radius: 8px;
        height: 150px;
        overflow-y: auto;
        font-size: 0.98em;
        color: #374151;
        border: 1px solid #e2e8f0;
      }
      #peers {
        margin-top: 2em;
        font-size: 0.98em;
        color: #4a5568;
      }
      #folderView {
        margin-top: 2em;
        background: #f9fafb;
        border: 1px solid #e2e8f0;
        border-radius: 8px;
        padding: 1em;
        display: none;
      }
      #folderView h2 {
        font-size: 1.2em;
        margin-bottom: 0.5em;
        color: #2b6cb0;
      }
      #folderFiles {
        list-style: none;
        padding: 0;
        margin: 0 0 1em 0;
      }
      #folderFiles li {
        margin-bottom: 0.5em;
        padding: 0.3em 0.5em;
        border-radius: 4px;
        background: #e7f0fa;
        display: flex;
        align-items: center;
        justify-content: space-between;
      }
      #downloadFolderBtn {
        margin-bottom: 1em;
      }
    </style>
  </head>
  <body>
    <background-animation></background-animation>
    <loading-screen></loading-screen>
    <app-shell></app-shell>

    <script src="./background-animation.js" type="module"></script>
    <script src="./loading-screen.js" type="module"></script>
    <script src="./shell.js" type="module"></script>
  </body>
</html>
